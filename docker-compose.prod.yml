version: '3.8'

services:
  # Infrastructure
  postgres:
    image: postgres:15-alpine
    container_name: ori-os-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ori}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ori_password}
      POSTGRES_DB: ${POSTGRES_DB:-ori_os}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ori_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ori}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ori-os-redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - ori_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: ori-os-meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped
    networks:
      - ori_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7700/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: ori-os-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - ori_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Applications
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ori-os-api
    restart: always
    expose:
      - "4000"
    env_file: .env.prod
    environment:
      - NODE_ENV=production
      - API_PORT=4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ori_network

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ori-os-worker
    restart: always
    env_file: .env.prod
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ori_network

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: ori-os-web
    restart: always
    expose:
      - "3000"
    env_file: .env.prod
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      - api
    networks:
      - ori_network

  caddy:
    image: caddy:2-alpine
    container_name: ori-os-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    networks:
      - ori_network

networks:
  ori_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
  caddy_data:
  caddy_config:
